# Prefix
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; \
  display-message "source-file done"

# Splits
bind s split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigation
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

bind d kill-pane

# CRT shader per-pane regeneration
set-hook -g after-split-window    "run-shell '~/.config/ghostty/shaders/generate-crt.sh'"
set-hook -g after-resize-pane     "run-shell '~/.config/ghostty/shaders/generate-crt.sh'"
set-hook -g pane-exited           "run-shell '~/.config/ghostty/shaders/generate-crt.sh'"
set-hook -g window-layout-changed "run-shell '~/.config/ghostty/shaders/generate-crt.sh'"

